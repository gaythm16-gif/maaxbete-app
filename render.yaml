# Render Blueprint — déploiement du backend
# https://render.com/docs/blueprint-spec
# Connecter le repo GitHub puis New → Blueprint pour créer le service.
# PORT est fourni automatiquement par Render.
services:
  - type: web
    name: maaxbete-backend
    runtime: node
    buildCommand: npm install
    startCommand: npm run proxy
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://maaxbete-app.vercel.app
      # À ajouter dans le dashboard Render après création MySQL sur Railway :
      # DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD
      # CASINO_API_URL, CASINO_AGENT_CODE, CASINO_TOKEN, CASINO_SECRET
      # CASINO_SITE_ENDPOINT = https://maaxbete-app.vercel.app
      # CASINO_CALLBACK_URL = https://maaxbete-backend.onrender.com/api/casino/callback
