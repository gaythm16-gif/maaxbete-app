# Render Blueprint — déploiement du backend
# https://render.com/docs/blueprint-spec
# Connecter le repo GitHub puis New → Blueprint pour créer le service.
# PORT est fourni automatiquement par Render.
services:
  - type: web
    name: maaxbete-backend
    runtime: node
    buildCommand: npm install
    startCommand: npm run proxy
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://maaxbete-app.vercel.app
