# Render Blueprint — déploiement du backend
# https://render.com/docs/blueprint-spec
# Connecter le repo GitHub puis New → Blueprint pour créer le service.
# PORT est fourni automatiquement par Render.
services:
  - type: web
    name: maaxbete-backend
    runtime: node
    buildCommand: npm install
    startCommand: npm run proxy
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://maaxbete-app.vercel.app
      - key: CASINO_SITE_ENDPOINT
        value: https://maaxbete-app.vercel.app
      - key: CASINO_CALLBACK_URL
        value: https://maaxbete-backend.onrender.com/api/casino/callback
      # Si le jeu affiche CREDIT Rp0 : essayer true (solde en centimes) puis multiplier si BET reste trop haut
      # - key: CASINO_BALANCE_IN_CENTS
      #   value: "true"
      # - key: CASINO_CALLBACK_BALANCE_MULTIPLIER
      #   value: "1000"
      - key: CASINO_API_URL
        value: https://api.nexusggr.com
